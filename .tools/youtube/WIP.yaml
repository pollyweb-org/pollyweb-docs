project: pollyweb-docs
updated_at: "2026-03-10"
purpose: "Session recovery instructions for YouTube mapping/publish/rename workflow."

current_state:
  youtube_channel:
    handle: "@PollyWeb"
    note: "Authenticated channel used by scripts."
  mapping:
    map_file: ".tools/youtube/youtube-upload-map.csv"
    index_file: ".tools/youtube/video-index.yaml"
    status_summary:
      deduplicated_on_channel: true
      drafts_published: true
      title_rename_to_original_title: "partially completed"
  blockers:
    - "YouTube Data API daily quota can be exceeded during rename runs."
    - "Upload attempts may fail with uploadLimitExceeded (channel upload cap)."

auth:
  oauth_user_token_file: ".tools/youtube/youtube-oauth-token.json"
  oauth_client_source: ".tools/youtube/tokens.yaml -> youtube.testing.client_id/client_secret"
  note: "If oauth token expires/revokes, re-run publish script with --auth-mode console."

scripts:
  sync_videos: ".tools/youtube/sync_github_videos.py"
  publish_from_map: ".tools/youtube/publish_youtube_from_map.py"
  combined_ops: ".tools/youtube/youtube_map_ops.py"

restart_checklist:
  - step: "1) Verify environment"
    run:
      - "../pollyweb-docs/.venv/bin/python3.14 -V"
      - "../pollyweb-docs/.venv/bin/python3.14 -m pip -V"
  - step: "2) Verify OAuth token exists"
    run:
      - "ls -la .tools/youtube/youtube-oauth-token.json"
  - step: "3) Re-sync map from channel (public + private via API)"
    run:
      - "../pollyweb-docs/.venv/bin/python3.14 - <<'PY'\nfrom pathlib import Path\nimport csv,re,json\nfrom google.oauth2.credentials import Credentials\nfrom googleapiclient.discovery import build\nroot=Path('../pollyweb-docs')\nmap_path=root/'.tools'/'youtube'/'youtube-upload-map.csv'\nrows=list(csv.DictReader(map_path.open(newline='',encoding='utf-8')))\nfields=list(rows[0].keys())\ncreds=Credentials.from_authorized_user_info(json.loads((root/'.tools'/'youtube'/'youtube-oauth-token.json').read_text()),['https://www.googleapis.com/auth/youtube'])\nyt=build('youtube','v3',credentials=creds)\nids=[]; tok=None\nwhile True:\n r=yt.search().list(part='id',forMine=True,type='video',maxResults=50,pageToken=tok).execute(); ids += [i['id']['videoId'] for i in r.get('items',[])]; tok=r.get('nextPageToken');\n if not tok: break\nids=list(dict.fromkeys(ids))\npat=re.compile(r'([0-9a-fA-F]{8})[^0-9a-fA-F]+([0-9a-fA-F]{4})[^0-9a-fA-F]+([0-9a-fA-F]{4})[^0-9a-fA-F]+([0-9a-fA-F]{4})[^0-9a-fA-F]+([0-9a-fA-F]{12})')\nby={}\nfor i in range(0,len(ids),50):\n v=yt.videos().list(part='snippet',id=','.join(ids[i:i+50]),maxResults=50).execute()\n for it in v.get('items',[]):\n  m=pat.search(it.get('snippet',{}).get('title',''))\n  if m: by['-'.join(g.lower() for g in m.groups())]=f\"https://www.youtube.com/watch?v={it['id']}\"\nfor r in rows:\n aid=(r.get('asset_id') or '').lower();\n if aid in by: r['youtube_url']=by[aid]\nwith map_path.open('w',newline='',encoding='utf-8') as f:\n w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(rows)\nprint('synced_rows_with_url',sum(1 for r in rows if (r.get('youtube_url') or '').strip()))\nPY"
  - step: "4) Run rename-only pass (recommended after daily quota reset)"
    run:
      - "../pollyweb-docs/.venv/bin/python3.14 ../pollyweb-docs/.tools/youtube/youtube_map_ops.py --do-rename --apply"
  - step: "5) Verify final privacy/title status summary"
    run:
      - "../pollyweb-docs/.venv/bin/python3.14 ../pollyweb-docs/.tools/youtube/publish_youtube_from_map.py --youtube-profile testing"

quota:
  reset_rule: "YouTube Data API daily quota resets at midnight Pacific Time."
  lisbon_reference: "Typically around 07:00 Europe/Lisbon (check DST)."
  strategy:
    - "Prioritize rename-only on reset window."
    - "Avoid uploads during rename catch-up to preserve quota."

do_not:
  - "Do not paste tokens in chat."
  - "Do not run upload batches if uploadLimitExceeded persists."
